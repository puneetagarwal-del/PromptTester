version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: prompt_tester_db
    environment:
      POSTGRES_USER: puneetagarwal
      POSTGRES_PASSWORD: postgrespuneet
      POSTGRES_DB: prompt_tester
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puneetagarwal"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prompt_tester_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://puneetagarwal:postgrespuneet@postgres:5432/prompt_tester
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FLASK_ENV: development
      FLASK_DEBUG: "True"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python app.py

volumes:
  postgres_data:
