databases:
  - name: prompt-tester-db
    plan: free
    databaseName: prompt_tester
    user: promptuser

services:
  - type: web
    name: prompt-tester
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prompt-tester-db
          property: connectionURI
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.7
